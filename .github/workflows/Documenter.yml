name: Documenter

on:
  push:
    branches:
      - master
    tags: ['*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
      - name: Load Julia packages from cache
        id: julia-cache
        uses: julia-actions/cache@v2
      - name: Install GitHubActions.jl in its own (shared) environment
        run: |
          using Pkg
          Pkg.activate("docs-logger-env"; shared=true)
          Pkg.add(Pkg.PackageSpec(name="GitHubActions", version="0.1"))
        shell: julia --color=yes {0}

      - name: Build the documentation
        run: |
          # The Julia command that will be executed
          julia_cmd=( julia -i --color=yes --project=. -e '
              using Pkg
              Pkg.instantiate()
              using REPL # to avoid bug with DataREPL module in DataSets.jl, remove once that is taken care of
              @eval Module() begin
                  push!(LOAD_PATH, "@docs-logger-env") # access GitHubActions.jl
                  import Logging, GitHubActions
                  Logging.global_logger(GitHubActions.GitHubActionsLogger())
                  pop!(LOAD_PATH)
              end
              include("make.jl")' )

          # Run the Julia command
          echo 'exit(0)' | "${julia_cmd[@]}"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
      - name: Save Julia depot cache on cancel or failure
        id: julia-cache-save
        if: cancelled() || failure()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ steps.julia-cache.outputs.cache-paths }}
          key: ${{ steps.julia-cache.outputs.cache-key }}
